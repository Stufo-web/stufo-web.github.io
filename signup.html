<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | Stufo</title>
  <link rel="stylesheet" href="css/signin.css"> <!-- reuse same CSS -->
</head>
<body>

<div class="page">
  <div class="card" style="text-align: center;" >
    <h1>Create Account</h1>
    <p >Start your focus journey with Stufo</p>

    <form id="signupForm" onsubmit="handleSignup(event)">
      <input type="text" id="name" placeholder="Full Name" required>
      <br>
      <br>
      <input type="email" id="email" placeholder="Email" required>
      <br>
      <br>
      <input type="password" id="password" placeholder="Password" required>
<br>
<br>

      <button type="submit">Sign Up</button>
    </form>

    <span class="link">
      Already have an account? <a href="signin.html">Sign in</a>
    </span>
  </div>
</div>

<script src="signu.js"></script>
<script type="module">
  const firebaseConfig = {
    apiKey: "AIzaSyC9kTiwWg1HoOZoRFEiWVjLnmVEDskSidw",
    authDomain: "stufo-34461.firebaseapp.com",
    projectId: "stufo-34461",
    storageBucket: "stufo-34461.firebasestorage.app",
    messagingSenderId: "65118577418",
    appId: "1:65118577418:web:d6ac5cc90d2a62789210f3"
  };
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
  import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
  import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.handleSignup = async function(event) {
    event.preventDefault();
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      
      // Store user details in Firestore
      await setDoc(doc(db, 'users', user.uid), {
        name: name,
        email: email,
        createdAt: new Date()
      });

      alert('Account created successfully!');
      window.location.href = 'focus.html';
    } catch (error) {
      alert('Error: ' + error.message);
    }
  };
</script>
</body>
</html>
